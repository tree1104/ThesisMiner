# =============================================================================
# ThesisMiner v9.0 模型配置文件
# =============================================================================
# 本文件定义 ThesisMiner 支持的所有 LLM 模型配置，包括：
#   - 模型基础信息（ID/标签/提供商/发布年份）
#   - API 配置（基础 URL/API Key 环境变量/认证方式）
#   - 能力标记（capabilities: deep_thinking/web_search/streaming + 旧版 supports_*）
#   - 上下文与生成参数（最大上下文/最大输出/温度/Top-P）
#   - 定价信息（input/cached_input/output + 旧版 input_cny_per_million，单位：人民币元/百万 Token）
#   - 限流配置（每分钟请求数/每分钟 Token 数/每日上限）
#   - Agent 角色偏好（默认角色/备选角色，v9.0 新增 thesis_writer）
#   - 降级策略（降级目标/降级条件）
#   - 超时与重试配置
#
# 所有 API Key 通过环境变量注入，格式为 {MODEL_ID}_API_KEY（大写）
# 定价单位：人民币元 / 百万 Token（CNY per million tokens）
# =============================================================================

# ===== 全局模型配置 =====
global:
  # 默认模型（当未指定时使用）
  default_model: "deepseek-v4"
  # 默认思考模型
  default_reasoner: "deepseek-v4"
  # 默认编排模型
  default_orchestrator: "deepseek-r3"
  # 默认检索模型
  default_searcher: "gpt-5-mini"
  # 默认导师模型
  default_mentor: "glm-5.2"
  # 默认创意模型
  default_inspire: "glm-5.2-flash"
  # 默认报告模型
  default_report: "claude-opus-5"
  # 默认论文写作模型（v9.0 新增）
  default_thesis_writer: "gpt-5"

  # 全局超时（秒）
  default_timeout: 60
  # 全局重试次数
  default_max_retries: 3
  # 全局重试初始延迟（秒）
  default_retry_delay: 1.0
  # 全局重试退避倍数
  default_retry_backoff: 2.0

  # 货币单位
  currency: "CNY"
  # 每月预算上限（元）
  monthly_budget: 5000
  # 每日预算上限（元）
  daily_budget: 200
  # 预算告警阈值（百分比）
  budget_alert_threshold: 80

  # 成本优化策略
  cost_optimization:
    enabled: true
    # 低成本优先策略
    prefer_low_cost: false
    # 缓存命中率目标
    cache_hit_target: 0.6
    # 自动降级阈值（单次调用成本超过此值时降级）
    auto_downgrade_threshold: 5.0

# ===== 模型提供商配置 =====
providers:
  openai:
    name: "OpenAI"
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    auth_type: "bearer"
    docs_url: "https://platform.openai.com/docs"
    rate_limit:
      requests_per_minute: 60
      tokens_per_minute: 150000
    timeout: 60

  deepseek:
    name: "DeepSeek"
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    auth_type: "bearer"
    docs_url: "https://platform.deepseek.com/docs"
    rate_limit:
      requests_per_minute: 60
      tokens_per_minute: 100000
    timeout: 60

  anthropic:
    name: "Anthropic"
    base_url: "https://api.anthropic.com/v1"
    api_key_env: "ANTHROPIC_API_KEY"
    auth_type: "x-api-key"
    docs_url: "https://docs.anthropic.com"
    rate_limit:
      requests_per_minute: 50
      tokens_per_minute: 120000
    timeout: 90

  qwen:
    name: "Alibaba Qwen"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key_env: "DASHSCOPE_API_KEY"
    auth_type: "bearer"
    docs_url: "https://help.aliyun.com/zh/dashscope"
    rate_limit:
      requests_per_minute: 60
      tokens_per_minute: 100000
    timeout: 60

  google:
    name: "Google AI"
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    api_key_env: "GOOGLE_API_KEY"
    auth_type: "query-param"
    docs_url: "https://ai.google.dev/docs"
    rate_limit:
      requests_per_minute: 60
      tokens_per_minute: 120000
    timeout: 60

  zhipu:
    name: "Zhipu AI"
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    api_key_env: "ZHIPU_API_KEY"
    auth_type: "bearer"
    docs_url: "https://open.bigmodel.cn/dev/api"
    rate_limit:
      requests_per_minute: 50
      tokens_per_minute: 80000
    timeout: 60

  bytecode:
    name: "ByteDance Volcengine"
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    api_key_env: "VOLCENGINE_API_KEY"
    auth_type: "bearer"
    docs_url: "https://www.volcengine.com/docs/82379"
    rate_limit:
      requests_per_minute: 60
      tokens_per_minute: 100000
    timeout: 60

# ===== 模型定义 =====
models:

  # ---------------------------------------------------------------------------
  # 1. DeepSeek V4（DeepSeek，2026.06）- 高性价比通用 + 推理模型
  # ---------------------------------------------------------------------------
  - id: "deepseek-v4"
    name: "DeepSeek V4"
    label: "DeepSeek V4 (2026.06)"
    provider: "deepseek"
    release_year: 2026
    description: "DeepSeek 2026.06 最新通用模型，支持深度思考与联网搜索，高性价比"

    # API 配置
    api:
      base_url: "https://api.deepseek.com/v1"
      api_key_env: "DEEPSEEK_API_KEY"
      model_name: "deepseek-v4"
      auth_type: "bearer"

    # 能力标记（v9.0 新结构）
    capabilities:
      deep_thinking: true
      web_search: true
      streaming: true
      # 旧版兼容字段
      supports_streaming: true
      supports_thinking: true
      supports_web_search: true
      supports_vision: false
      supports_function_calling: true
      supports_json_mode: true
      supports_parallel_function_calling: false

    # 上下文与生成参数
    context:
      context_length: 256000
      max_context: 256000
      max_output: 16384
      default_temperature: 0.7
      default_top_p: 1.0
      default_max_tokens: 8192
      chars_per_token: 3.5

    # 定价（人民币元/百万 Token）
    pricing:
      input: 4
      cached_input: 1
      output: 16
      # 旧版兼容字段
      input_cny_per_million: 4
      cached_input_cny_per_million: 1
      output_cny_per_million: 16
      currency: "CNY"

    # 限流
    rate_limit:
      requests_per_minute: 60
      tokens_per_minute: 100000
      requests_per_day: 10000
      concurrent_requests: 5

    # Agent 角色偏好
    agent_roles:
      default: "reasoner"
      alternatives: ["mentor", "search"]

    # 降级策略
    fallback:
      target_model: "glm-5.2"
      conditions:
        - "rate_limit_exceeded"
        - "timeout"
        - "service_unavailable"

    # 超时与重试
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

  # ---------------------------------------------------------------------------
  # 2. DeepSeek R3（DeepSeek，2026.06）- 深度推理模型
