      deep_thinking: false
      web_search: false
      streaming: true
      supports_streaming: true
      supports_thinking: false
      supports_web_search: false
      supports_vision: true
      supports_function_calling: true
      supports_json_mode: true
      supports_parallel_function_calling: false

    context:
      context_length: 128000
      max_context: 128000
      max_output: 4096
      default_temperature: 0.7
      default_top_p: 1.0
      default_max_tokens: 2048
      chars_per_token: 3.0

    pricing:
      input: 3
      cached_input: 0.8
      output: 9
      input_cny_per_million: 3
      cached_input_cny_per_million: 0.8
      output_cny_per_million: 9
      currency: "CNY"

    rate_limit:
      requests_per_minute: 60
      tokens_per_minute: 100000
      requests_per_day: 10000
      concurrent_requests: 5

    agent_roles:
      default: "inspire"
      alternatives: ["mentor"]

    fallback:
      target_model: "glm-5.2-flash"
      conditions:
        - "rate_limit_exceeded"
        - "timeout"
        - "service_unavailable"

    timeout: 30
    max_retries: 3
    retry_delay: 1.0

# ===== 模型对比表 =====
comparison:
  # 按成本排序（从低到高）
  by_cost:
    - "glm-5.2-flash"
    - "doubao-2.0-pro"
    - "deepseek-v4"
    - "glm-5.2"
    - "qwen3-max-2026"
    - "deepseek-r3"
    - "gpt-5-mini"
    - "gemini-3-pro"
    - "gpt-5"
    - "claude-opus-5"

  # 按上下文长度排序（从长到短）
  by_context:
    - "gemini-3-pro"      # 200 万
    - "gpt-5"             # 40 万
    - "deepseek-v4"       # 25.6 万
    - "qwen3-max-2026"    # 25.6 万
    - "glm-5.2"           # 20 万
    - "claude-opus-5"     # 20 万
    - "deepseek-r3"       # 12.8 万
    - "glm-5.2-flash"     # 12.8 万
    - "gpt-5-mini"        # 12.8 万
    - "doubao-2.0-pro"    # 12.8 万

  # 按推理能力排序
  by_reasoning:
    - "claude-opus-5"
    - "gpt-5"
    - "deepseek-r3"
    - "gemini-3-pro"
    - "deepseek-v4"
    - "qwen3-max-2026"
    - "glm-5.2"
    - "gpt-5-mini"
    - "glm-5.2-flash"
    - "doubao-2.0-pro"

# ===== A/B 测试配置 =====
ab_testing:
  enabled: false
  experiments:
    - name: "generation_quality"
      model_a: "gpt-5"
      model_b: "claude-opus-5"
      traffic_split: 0.5
      metrics: ["quality_score", "user_satisfaction"]
    - name: "search_efficiency"
      model_a: "gpt-5-mini"
      model_b: "gemini-3-pro"
      traffic_split: 0.5
      metrics: ["response_time", "result_relevance"]
